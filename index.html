<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ใบส่งมอบงาน — PHUMINA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
@media screen{*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Sarabun',sans-serif;font-size:15px;background:#f0efe9;color:#222;-webkit-text-size-adjust:100%}.app{max-width:700px;margin:0 auto;padding:16px}h1{font-size:18px;font-weight:700;margin-bottom:14px;letter-spacing:.02em}.tabs{display:flex;border-bottom:1px solid #ddd;margin-bottom:16px}.tab{padding:10px 18px;font-size:14px;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;font-family:'Sarabun',sans-serif}.tab.active{color:#222;border-bottom:2px solid #222;font-weight:600}.panel{display:none}.panel.active{display:block}.card{background:#fff;border:1px solid #e8e8e4;border-radius:12px;padding:14px 16px;margin-bottom:12px}.sec-label{font-size:11px;font-weight:700;color:#888;letter-spacing:.08em;text-transform:uppercase;margin-bottom:10px}.field{margin-bottom:10px}.field label{display:block;font-size:12px;color:#666;margin-bottom:3px;font-family:'Sarabun',sans-serif}.field input,.field textarea,.field select{width:100%;padding:9px 11px;font-size:15px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#222;font-family:'Sarabun',sans-serif;-webkit-appearance:none}.field textarea{resize:vertical;min-height:64px}.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.items-table{width:100%;border-collapse:collapse;font-size:13px}.items-table th{background:#f5f5f0;padding:8px;text-align:left;font-weight:700;font-size:12px;border:1px solid #e0e0da}.items-table td{padding:5px;border:1px solid #e0e0da;vertical-align:middle}.items-table td input,.items-table td select{width:100%;border:none;background:transparent;font-size:13px;color:#222;padding:3px 4px;font-family:'Sarabun',sans-serif}.del-btn{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:0 4px}.add-row-btn{font-size:13px;padding:8px;border:1px dashed #ccc;border-radius:8px;background:none;color:#999;cursor:pointer;width:100%;margin-top:6px;font-family:'Sarabun',sans-serif}.logo-upload-area{border:1px dashed #ccc;border-radius:8px;padding:12px;text-align:center;cursor:pointer;background:#fafaf8;margin-bottom:8px}.logo-upload-area img{max-height:60px;max-width:180px;object-fit:contain}.logo-upload-area .placeholder{font-size:13px;color:#aaa}#logoInput{display:none}.photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:8px}.photo-slot{border:1px dashed #ccc;border-radius:8px;background:#fafaf8;overflow:hidden;position:relative}.photo-slot img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block}.photo-slot .remove-btn{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:14px;cursor:pointer;line-height:24px;text-align:center}.photo-slot .cap-input{width:100%;font-size:12px;border:none;border-top:1px solid #eee;background:#fff;color:#555;padding:5px 8px;font-family:'Sarabun',sans-serif}.add-photo-btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border:1px dashed #ccc;border-radius:8px;background:#fafaf8;color:#888;font-size:13px;cursor:pointer;margin-top:10px;font-family:'Sarabun',sans-serif}#fileInput{display:none}.print-btn{width:100%;padding:14px;border:none;border-radius:12px;background:#1a1a1a;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:'Sarabun',sans-serif;margin-top:4px}.print-btn:active{background:#444}.hint{font-size:12px;color:#999;text-align:center;margin-top:8px;line-height:1.6}.hint b{color:#555}.preview-outer{background:#ddd;border-radius:12px;padding:12px}}
@media print{*{box-sizing:border-box;margin:0;padding:0}html,body{background:#fff!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}body>*{display:none!important}#doc{display:block!important}@page{margin:6mm 8mm;size:A4}#doc{font-family:'Sarabun',Arial,sans-serif;font-size:11px;line-height:1.75;color:#111;width:100%}.photo-item{break-inside:avoid;page-break-inside:avoid}.sig-section{break-inside:avoid;page-break-inside:avoid}}
#doc{font-family:'Sarabun',Arial,sans-serif;color:#111;line-height:1.75}
@media screen{#doc{background:#fff;padding:28px 32px;border-radius:8px;font-size:12px}}
#doc .hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}#doc .logo-area img{max-height:52px;max-width:160px;object-fit:contain;display:block}#doc .logo-text{font-size:22px;font-weight:700;letter-spacing:2px;color:#111;line-height:1}#doc .logo-sub{font-size:7px;letter-spacing:4px;color:#999;margin-top:3px;text-transform:uppercase}#doc .proj-block{text-align:right}#doc .proj-title{font-size:13px;font-weight:700;color:#c8a04a;max-width:250px;line-height:1.4;margin-left:auto}#doc .proj-code{font-size:10px;color:#bbb;margin-top:3px}#doc .divider{border:none;border-top:1px solid #e8e8e8;margin:10px 0}#doc .info-block{display:flex;gap:6px;margin-bottom:4px}#doc .info-label{font-weight:700;min-width:150px;flex-shrink:0;font-size:11px;color:#444}#doc .info-val{font-size:11px;color:#111}#doc .section-title{font-size:12px;font-weight:700;margin:14px 0 7px;color:#111}#doc table{width:100%;border-collapse:collapse;font-size:11px}#doc th{background:#f7f7f5;padding:7px 9px;font-weight:700;border:1px solid #ddd;text-align:left;color:#333}#doc td{padding:7px 9px;border:1px solid #ddd;vertical-align:top;color:#111}#doc .remarks-block{margin-top:10px;font-size:11px;line-height:1.7}#doc .photo-grid-doc{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:8px}#doc .photo-item{break-inside:avoid;page-break-inside:avoid}#doc .photo-item img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:4px;display:block}#doc .photo-cap{font-size:10px;color:#777;text-align:center;margin-top:4px;font-style:italic;min-height:14px}#doc .sig-section{margin-top:20px;break-inside:avoid}#doc .sig-title{font-size:12px;font-weight:700;margin-bottom:8px}#doc .sig-table{width:100%;border-collapse:collapse}#doc .sig-table td{border:1px solid #ddd;padding:14px 16px;width:50%;vertical-align:top}#doc .sig-name-hdr{font-weight:700;text-align:center;font-size:11px;margin-bottom:10px}#doc .sig-role{font-size:9px;color:#aaa;text-align:center;margin-top:-6px;margin-bottom:12px}#doc .sig-line{margin-top:20px;font-size:11px;border-bottom:1px solid #ccc;padding-bottom:2px;color:#555;width:88%}
</style>
</head>
<body>
<div id="doc" style="display:none"></div>
<div class="app">
<h1>ใบส่งมอบงาน / Work Delivery Report</h1>
<div class="tabs">
<button class="tab active" id="tab-form" onclick="switchTab('form')">✏️ กรอกข้อมูล</button>
<button class="tab" id="tab-preview" onclick="switchTab('preview')">👁 ตัวอย่าง</button>
</div>
<div id="panel-form" class="panel active">
<div class="card"><div class="sec-label">โลโก้บริษัท</div>
<input type="file" id="logoInput" accept="image/*">
<div class="logo-upload-area" id="logoArea" onclick="document.getElementById('logoInput').click()">
<div class="placeholder" id="logoPlaceholder">📎 แตะเพื่ออัปโหลดโลโก้ (PNG / JPG)</div>
<img id="logoPreview" style="display:none;margin:0 auto"></div></div>
<div class="card"><div class="sec-label">บริษัท / โปรเจกต์</div>
<div class="row2"><div class="field"><label>ชื่อบริษัท / Studio</label><input id="companyName" value="PHUMINA DESIGN STUDIO"></div><div class="field"><label>รหัสโครงการ</label><input id="projectCode" placeholder="25-PHU40"></div></div>
<div class="field"><label>ชื่อโครงการ *</label><input id="projectTitle" placeholder="เช่น ก่อสร้างโรงเรียนอนุบาล นานาชาติ ต้าตี้"></div>
<div class="row2"><div class="field"><label>ชื่อลูกค้า</label><input id="clientName" placeholder="พีพีเอสพี แอสเซท จำกัด"></div><div class="field"><label>เบอร์ติดต่อ</label><input id="clientPhone" placeholder="-"></div></div>
<div class="row2"><div class="field"><label>วันที่เริ่มงาน</label><input type="date" id="startDate"></div><div class="field"><label>วันที่ส่งมอบ</label><input type="date" id="deliveryDate"></div></div></div>
<div class="card"><div class="sec-label">รายละเอียดการส่งมอบ</div>
<div class="row2"><div class="field"><label>งวดที่</label><input id="period" placeholder="7"></div><div class="field"><label>เงื่อนไขงวด</label><input id="periodCondition" placeholder="เมื่องานตัดเข็มแล้วเสร็จ 100%"></div></div></div>
<div class="card"><div class="sec-label">รายการงาน</div>
<table class="items-table"><thead><tr><th style="width:30px">#</th><th>รายการ</th><th style="width:80px">สถานะ</th><th>หมายเหตุ</th><th style="width:26px"></th></tr></thead><tbody id="itemsBody"></tbody></table>
<button class="add-row-btn" onclick="addItem()">+ เพิ่มรายการ</button></div>
<div class="card"><div class="sec-label">หมายเหตุ / ข้อสังเกต</div><div class="field"><textarea id="remarks" placeholder="หมายเหตุในวันส่งมอบ (ถ้ามี)"></textarea></div></div>
<div class="card"><div class="sec-label">รูปถ่ายหน้างาน</div>
<input type="file" id="fileInput" accept="image/*" multiple>
<div class="photo-grid" id="photoGrid"></div>
<button class="add-photo-btn" onclick="document.getElementById('fileInput').click()">📷 ถ่ายรูป / เลือกจากอัลบั้ม</button></div>
<div class="card"><div class="sec-label">ลายเซ็น</div>
<div class="row2"><div class="field"><label>ผู้ส่งมอบ</label><input id="sigSender" placeholder="ชื่อ - นามสกุล"></div><div class="field"><label>ผู้รับมอบ</label><input id="sigReceiver" placeholder="ชื่อ - นามสกุล"></div></div></div>
<button class="print-btn" onclick="doPrint()">🖨 พิมพ์ / Save as PDF</button>
<p class="hint">iPad/iPhone: กดปุ่มด้านบน → <b>Save as PDF</b><br>หรือ Share → Print → Pinch zoom out → Share → Save to Files</p>
</div>
<div id="panel-preview" class="panel"><div class="preview-outer"><div id="doc-preview-container"></div></div></div>
</div>
<script>
let photos=[],captions=[],itemCount=0,logoDataUrl='';
function g(id){return document.getElementById(id)}
function gv(id){return g(id)?g(id).value.trim():''}
function switchTab(t){['form','preview'].forEach(n=>{g('tab-'+n).classList.toggle('active',n===t);g('panel-'+n).classList.toggle('active',n===t);});if(t==='preview')buildDoc(g('doc-preview-container'));}
function fmtDate(d){if(!d)return'';try{return new Date(d+'T00:00:00').toLocaleDateString('th-TH',{year:'numeric',month:'long',day:'numeric'});}catch(e){return d;}}
g('logoInput').addEventListener('change',function(e){const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{logoDataUrl=ev.target.result;g('logoPreview').src=logoDataUrl;g('logoPreview').style.display='block';g('logoPlaceholder').style.display='none';};r.readAsDataURL(f);this.value='';});
function addItem(name='',status='100%',note=''){itemCount++;const n=itemCount;const tbody=g('itemsBody');const tr=document.createElement('tr');tr.id='row-'+n;const opts=['100%','90%','80%','70%','50%','เสร็จแล้ว','อยู่ระหว่างดำเนินการ'];tr.innerHTML=`<td style="text-align:center;color:#bbb;font-size:12px">${tbody.children.length+1}</td><td><input id="iname-${n}" value="${name}" placeholder="ชื่อรายการงาน"></td><td><select id="istat-${n}">${opts.map(s=>`<option${s===status?' selected':''}>${s}</option>`).join('')}</select></td><td><input id="inote-${n}" value="${note}" placeholder="-"></td><td><button class="del-btn" onclick="delItem(${n})">×</button></td>`;tbody.appendChild(tr);renum();}
function delItem(n){const el=g('row-'+n);if(el){el.remove();renum();}}
function renum(){g('itemsBody').querySelectorAll('tr').forEach((tr,i)=>{tr.cells[0].textContent=i+1;});}
function getItems(){return Array.from(g('itemsBody').querySelectorAll('tr')).map((tr,i)=>{const n=tr.id.replace('row-','');return{num:i+1,name:gv('iname-'+n),status:gv('istat-'+n),note:gv('inote-'+n)};});}
g('fileInput').addEventListener('change',function(e){Array.from(e.target.files).forEach(f=>{const r=new FileReader();r.onload=ev=>{photos.push(ev.target.result);captions.push('');renderPhotos();};r.readAsDataURL(f);});this.value='';});
function renderPhotos(){const grid=g('photoGrid');grid.innerHTML='';photos.forEach((src,i)=>{const slot=document.createElement('div');slot.className='photo-slot';slot.innerHTML=`<img src="${src}"><button class="remove-btn" onclick="removePhoto(${i})">×</button><input class="cap-input" placeholder="คำบรรยายใต้ภาพ" value="${captions[i]||''}" oninput="captions[${i}]=this.value">`;grid.appendChild(slot);});}
function removePhoto(i){photos.splice(i,1);captions.splice(i,1);renderPhotos();}
function buildDoc(target){const items=getItems();const rows=items.map(it=>`<tr><td style="text-align:center;width:28px">${it.num}</td><td><strong>${it.name||'-'}</strong></td><td style="text-align:center;width:64px">${it.status}</td><td>${it.note||'-'}</td></tr>`).join('');const co=gv('companyName').split(' ');const brand=co[0]||'PHUMINA';const sub=(co.slice(1).join(' ')||'DESIGN STUDIO').toUpperCase();const logoHtml=logoDataUrl?`<img src="${logoDataUrl}">`:`<div class="logo-text">${brand}</div><div class="logo-sub">${sub}</div>`;let imgHtml='';if(photos.length>0){const items2=photos.map((s,i)=>`<div class="photo-item"><img src="${s}"><div class="photo-cap">${captions[i]||''}</div></div>`).join('');imgHtml=`<div class="divider"></div><div class="section-title">รูปถ่ายหน้างาน (${photos.length} รูป)</div><div class="photo-grid-doc">${items2}</div>`;}target.innerHTML=`<div class="hdr"><div class="logo-area">${logoHtml}</div><div class="proj-block"><div class="proj-title">${gv('projectTitle')||'ชื่อโครงการ'}</div><div class="proj-code">รหัส : ${gv('projectCode')||'-'}</div></div></div><div class="divider"></div><div class="info-block"><span class="info-label">ชื่อลูกค้า :</span><span class="info-val">${gv('clientName')||'-'}</span></div><div class="info-block"><span class="info-label">โครงการ :</span><span class="info-val">${gv('projectTitle')||'-'}</span></div><div class="info-block"><span class="info-label">เบอร์ติดต่อ :</span><span class="info-val">${gv('clientPhone')||'-'}</span></div><div class="info-block"><span class="info-label">วันที่เริ่มงาน :</span><span class="info-val">${fmtDate(gv('startDate'))}</span></div><div class="info-block"><span class="info-label">วันที่ส่งมอบงานงวด ${gv('period')||'?'} :</span><span class="info-val">${fmtDate(gv('deliveryDate'))}</span></div><div class="divider"></div><div class="section-title">รายละเอียดการส่งมอบงาน งวด ${gv('period')||'?'} : ${gv('periodCondition')||''}</div><table><thead><tr><th style="width:28px">ลำดับ</th><th>รายการ</th><th style="width:64px">สถานะ</th><th>หมายเหตุ</th></tr></thead><tbody>${rows}</tbody></table><div class="remarks-block"><b>หมายเหตุ/ข้อสังเกตในวันส่งมอบ${gv('remarks')?'':' (ถ้ามี)'} :</b> ${gv('remarks')||''}</div>${imgHtml}<div class="sig-section"><div class="sig-title">ลงชื่อผู้ส่งมอบ / ผู้รับมอบ</div><table class="sig-table"><tr><td><div class="sig-name-hdr">ผู้ส่งมอบ (${brand})</div><div class="sig-line">ชื่อ : ${gv('sigSender')||'&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;'}</div><div class="sig-line">วันที่ : &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div><div class="sig-line">ลายเซ็น : &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div></td><td><div class="sig-name-hdr">ผู้รับมอบ</div><div class="sig-role">เจ้าของ/ผู้รับมอบ</div><div class="sig-line">ชื่อ : ${gv('sigReceiver')||'&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;'}</div><div class="sig-line">วันที่ : &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div><div class="sig-line">ลายเซ็น : &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</div></td></tr></table></div>`;}
function doPrint(){if(!gv('projectTitle')){alert('กรุณากรอกชื่อโครงการก่อน');return;}buildDoc(g('doc'));g('doc').style.display='block';window.print();setTimeout(()=>{g('doc').style.display='none';},1500);}
g('deliveryDate').value=new Date().toISOString().split('T')[0];
addItem('','100%','');addItem('','100%','');addItem('','100%','');
</script>
</body>
</html>
